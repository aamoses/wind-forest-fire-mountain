<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>风林火山·四方乱斗 - 课间对战</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">
  <div id="header">
    <h1>风林火山·四方乱斗</h1>
    <span id="brand">课间对战</span>
  </div>

  <div id="info-bar">
    <div id="turn-indicator"></div>
    <div id="mountain-counter"></div>
  </div>

  <div id="board-container">
    <svg id="board-svg"></svg>
    <div class="center-zone" id="center-zone"></div>
    <div id="points-layer"></div>
    <div id="pieces-layer"></div>
    <div id="traps-layer"></div>
    <div id="effects-layer"></div>
    <div id="arrows-layer"></div>
  </div>

  <div id="action-bar"></div>
  <div id="message-area"></div>
</div>

<!-- 开始画面 -->
<div id="start-overlay" class="overlay">
  <div class="overlay-content">
    <h2>⚔️ 行动顺序</h2>
    <div id="order-display"></div>
    <button id="start-btn" onclick="startGame()">开始对战</button>
  </div>
</div>

<!-- 胜利画面 -->
<div id="victory-overlay" class="overlay" style="display:none">
  <div class="overlay-content">
    <span id="victory-emoji"></span>
    <h2 id="victory-message"></h2>
    <button id="restart-btn" onclick="restartGame()">再来一局</button>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/board.js"></script>
<script src="js/skills.js"></script>
<script src="js/actions.js"></script>
<script src="js/app.js"></script>

</body>
</html>
